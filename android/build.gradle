// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // 8.10.x is the minimum that (a) satisfies androidx.browser:browser 1.9.0's
        // AGP >= 8.9.1 requirement and (b) officially supports compileSdk 36.
        // Stays within the current Gradle 8.11.1 wrapper (AGP 8.11+ would need 8.13).
        classpath 'com.android.tools.build:gradle:8.10.0'
        classpath 'com.google.gms:google-services:4.4.2'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
